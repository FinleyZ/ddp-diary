# VM (Linux) config — see spec.md §7 and config.example.toml for the full key
# reference with comments.

role = "vm"

[paths]
data_dir = "~/journal"
shared_dir = "/mnt/hgfs/share-folder/shared/pp/log"
claude_projects = "auto"
scratch_dir = "auto"

[claude]
bin = "auto"
# Pin the summarizing account to a specific CLAUDE_CONFIG_DIR (empty = inherit
# the active default login). Set this to the VM's personal config dir when the
# VM side is migrated, mirroring host.toml — e.g. "/home/<user>/.claude-personal".
config_dir = ""
model = "claude-sonnet-5"
output_format = "json"
allowed_tools = ["Read", "Glob", "Grep", "Write", "Edit"]
add_dirs = []

[limits]
max_turns = 15
max_budget_usd = 1.00
timeout_sec = 900
skim_max_files = 5
skim_max_lines = 200
# Auto-backfill missed days before today's run (spec.md §11) — this restores
# the original VM script's behavior (it auto-filled the past 7 days), but
# ships OFF here too until it's been watched run at least once manually.
backfill_days = 0
backfill_max_per_run = 3

[git]
remote = "origin"
branch = "master"
push = false
push_even_on_failure = false
commit_prefix = "journal:"

[sync]
export_prefix = "vm-daily-"
cursor_file = ".export-state"
ingest_glob = "*.md"
mirror = false

[log]
file = "auto"
level = "info"

